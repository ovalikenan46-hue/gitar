services:
  - type: web
    name: gitar-ogreniyorum
    runtime: node
    buildCommand: >
      pnpm install &&
      pnpm --filter @workspace/guitar-app run build &&
      pnpm --filter @workspace/api-server run build &&
      pnpm --filter @workspace/db run push-force
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
